<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Media Platform — Control Deck</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #7a7a8e;
    --accent: #ff3366;
    --accent-glow: rgba(255, 51, 102, 0.25);
    --green: #00e676;
    --amber: #ffc107;
    --blue: #448aff;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(255,51,102,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(68,138,255,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .shell {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 48px;
  }

  header .logo {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #cc2952);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 24px var(--accent-glow);
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header h1 span { color: var(--accent); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    margin-left: auto;
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 8px rgba(0,230,118,0.5); }
  .status-dot.error { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

  /* Now Playing Card */
  .now-playing {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }

  .now-playing::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--blue), var(--accent));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .now-playing.active::before { opacity: 1; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .np-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .np-state {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .np-state .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .badge.idle { background: var(--surface-2); color: var(--text-dim); }
  .badge.buffering { background: rgba(255,193,7,0.15); color: var(--amber); }
  .badge.playing { background: rgba(0,230,118,0.15); color: var(--green); }
  .badge.paused { background: rgba(68,138,255,0.15); color: var(--blue); }
  .badge.stopped { background: rgba(255,51,102,0.1); color: var(--accent); }
  .badge.error { background: rgba(255,51,102,0.2); color: var(--accent); }

  .np-title {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
  }

  .np-title.empty {
    color: var(--text-dim);
    font-weight: 300;
    font-size: 18px;
  }

  /* Player Controls */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
  }

  .ctrl-btn {
    flex: 1;
    padding: 14px 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .ctrl-btn:hover {
    border-color: var(--accent);
    background: var(--surface-2);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  .ctrl-btn:active { transform: translateY(0); }

  .ctrl-btn.play:hover { border-color: var(--green); box-shadow: 0 4px 16px rgba(0,230,118,0.15); }
  .ctrl-btn.pause:hover { border-color: var(--blue); box-shadow: 0 4px 16px rgba(68,138,255,0.15); }
  .ctrl-btn.stop:hover { border-color: var(--accent); box-shadow: 0 4px 16px var(--accent-glow); }

  .ctrl-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  /* Add to Queue */
  .add-form {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .add-form input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-form input:focus { border-color: var(--accent); }
  .add-form input::placeholder { color: var(--text-dim); }

  .add-form button {
    padding: 12px 24px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .add-form button:hover {
    background: #e62e5c;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  /* Queue List */
  .queue-section h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .queue-list { list-style: none; }

  .queue-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    transition: all 0.2s;
    animation: slideIn 0.25s ease-out;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .queue-item:hover { border-color: var(--accent); }

  .queue-item .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    width: 24px;
    text-align: center;
    flex-shrink: 0;
  }

  .queue-item .info { flex: 1; min-width: 0; }
  .queue-item .title {
    font-weight: 500;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .queue-item .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .queue-item .remove-btn {
    width: 32px; height: 32px;
    border: 1px solid transparent;
    border-radius: 8px;
    background: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .queue-item .remove-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(255,51,102,0.08);
  }

  .empty-queue {
    text-align: center;
    padding: 48px 0;
    color: var(--text-dim);
    font-size: 14px;
  }

  .empty-queue .icon { font-size: 32px; margin-bottom: 8px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: var(--radius);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    z-index: 100;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: rgba(255,51,102,0.15); border: 1px solid var(--accent); color: var(--accent); }
  .toast.success { background: rgba(0,230,118,0.1); border: 1px solid var(--green); color: var(--green); }

  /* Queue Mode Selector */
  .mode-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .mode-bar label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .mode-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .mode-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255,51,102,0.08);
  }

  .mode-btn:hover { border-color: var(--accent); color: var(--text); }

  /* Position + Retry info */
  .np-meta {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  .np-meta .error-info { color: var(--accent); }

  /* YouTube Player */
  .player-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    margin-bottom: 32px;
    border-radius: var(--radius);
    overflow: hidden;
    background: #000;
    border: 1px solid var(--border);
  }

  .player-wrap.hidden { display: none; }

  .player-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
</style>
</head>
<body>

<div class="shell">
  <header>
    <div class="logo">▶</div>
    <h1><span>media</span>::platform</h1>
    <a href="/tv.html" target="_blank" title="Open TV Overlay" style="color:var(--text-dim);text-decoration:none;font-size:13px;font-family:'JetBrains Mono',monospace;padding:4px 10px;border:1px solid var(--border);border-radius:6px;transition:all 0.2s;">📺 TV</a>
    <div class="status-dot" id="statusDot" title="API status"></div>
  </header>

  <!-- YouTube Player -->
  <div class="player-wrap hidden" id="playerWrap">
    <div id="ytPlayer"></div>
  </div>

  <!-- Now Playing -->
  <div class="now-playing" id="nowPlaying">
    <div class="np-label">Now Playing</div>
    <div class="np-state">
      <span class="badge idle" id="stateBadge">Idle</span>
    </div>
    <div class="np-title empty" id="npTitle">Nothing queued</div>
    <div class="np-meta" id="npMeta"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn play" onclick="cmd('play')">▶ Play</button>
    <button class="ctrl-btn pause" onclick="cmd('pause')">⏸ Pause</button>
    <button class="ctrl-btn" onclick="cmd('skip')">⏭ Skip</button>
    <button class="ctrl-btn stop" onclick="cmd('stop')">⏹ Stop</button>
  </div>

  <!-- Add to Queue -->
  <div class="queue-section">
    <h2>Queue</h2>

    <!-- Queue Mode -->
    <div class="mode-bar">
      <label>Mode:</label>
      <button class="mode-btn active" data-mode="Normal" onclick="setMode('Normal')">Normal</button>
      <button class="mode-btn" data-mode="Shuffle" onclick="setMode('Shuffle')">🔀 Shuffle</button>
      <button class="mode-btn" data-mode="PlayNext" onclick="setMode('PlayNext')">⏭ Play Next</button>
    </div>

    <form class="add-form" onsubmit="addToQueue(event)">
      <input type="url" id="urlInput" placeholder="https://youtube.com/watch?v=..." required>
      <input type="text" id="titleInput" placeholder="Title" required>
      <input type="number" id="startAtInput" placeholder="Start (s)" min="0" step="1" style="width:90px">
      <button type="submit">+ Add</button>
    </form>

    <ul class="queue-list" id="queueList"></ul>
  </div>

  <!-- Analytics Summary -->
  <div style="margin-top:20px;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);display:flex;gap:24px;flex-wrap:wrap;">
    <span>📊 Commands: <span id="statCommands" style="color:var(--text)">0</span></span>
    <span>⏱ Playback: <span id="statPlayback" style="color:var(--text)">0:00</span></span>
    <span>⚡ Avg Latency: <span id="statLatency" style="color:var(--text)">0ms</span></span>
    <span>❌ Errors: <span id="statErrors" style="color:var(--text)">0</span></span>
  </div>

  <!-- Admin Controls -->
  <div style="margin-top:20px;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <h3 style="margin:0;font-size:14px;color:var(--text-dim);">🛡️ Security Controls</h3>
      <span id="killSwitchBadge" style="font-size:11px;padding:2px 8px;border-radius:8px;background:#2d5a2d;color:#7dff7d;">OPERATIONAL</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
      <button class="btn" onclick="activateKillSwitch()" style="background:#8b2500;font-size:12px;padding:6px 12px;">🚨 Kill Switch</button>
      <button class="btn" onclick="deactivateKillSwitch()" style="background:#2d5a2d;font-size:12px;padding:6px 12px;">✅ Resume</button>
      <button class="btn" onclick="viewAuditLog()" style="font-size:12px;padding:6px 12px;">📋 Audit Log</button>
      <button class="btn" onclick="checkAnomalies()" style="font-size:12px;padding:6px 12px;">🔍 Check Anomalies</button>
    </div>
    <div id="adminOutput" style="display:none;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;max-height:200px;overflow-y:auto;white-space:pre-wrap;color:var(--text-dim);"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const API = location.origin;
let polling = null;
let ytPlayer = null;
let ytReady = false;
let currentVideoId = null;
let lastApiState = null;

// YouTube IFrame API callback
function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('ytPlayer', {
    height: '100%',
    width: '100%',
    playerVars: {
      autoplay: 0,
      controls: 1,
      modestbranding: 1,
      rel: 0
    },
    events: {
      onReady: () => { ytReady = true; },
      onStateChange: onPlayerStateChange
    }
  });
}

function onPlayerStateChange(event) {
  // YT.PlayerState.ENDED === 0
  if (event.data === YT.PlayerState.ENDED) {
    cmd('skip').then(() => {
      setTimeout(() => cmd('play'), 300);
    });
  }
  // Report YouTube errors
  if (event.data === YT.PlayerState.CUED && lastApiState && lastApiState.state === 'Playing') {
    reportError('YouTube player error: video cued unexpectedly');
  }
}

function extractVideoId(url) {
  try {
    const u = new URL(url);
    if (u.hostname === 'youtu.be') return u.pathname.slice(1);
    if (u.searchParams.has('v')) return u.searchParams.get('v');
  } catch {}
  return null;
}

function syncPlayer(state) {
  if (!ytReady || !ytPlayer) return;
  const wrap = document.getElementById('playerWrap');
  const s = state.state.toLowerCase();

  if (state.currentItem) {
    const vid = extractVideoId(state.currentItem.url);
    if (vid && vid !== currentVideoId) {
      currentVideoId = vid;
      const startAt = state.currentItem.startAtSeconds || state.positionSeconds || 0;
      ytPlayer.loadVideoById({ videoId: vid, startSeconds: startAt });
      wrap.classList.remove('hidden');
      return;
    }
    wrap.classList.remove('hidden');
  }

  if (s === 'playing' && ytPlayer.getPlayerState && ytPlayer.getPlayerState() === YT.PlayerState.PAUSED) {
    ytPlayer.playVideo();
  } else if (s === 'paused' && ytPlayer.getPlayerState && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
    ytPlayer.pauseVideo();
  } else if (s === 'idle' || s === 'stopped') {
    if (currentVideoId) {
      ytPlayer.stopVideo();
      currentVideoId = null;
      wrap.classList.add('hidden');
    }
  }
}

async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error || `HTTP ${res.status}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

function toast(msg, type = 'error') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

async function refreshState() {
  try {
    const state = await api('/now-playing');
    lastApiState = state;
    renderState(state);
    syncPlayer(state);
  } catch {
    document.getElementById('statusDot').className = 'status-dot error';
  }
}

async function refreshQueue() {
  try {
    const items = await api('/queue');
    const list = document.getElementById('queueList');

    if (!items.length) {
      list.innerHTML = '<li class="empty-queue"><div class="icon">🎵</div>Queue is empty — add a YouTube URL above</li>';
      return;
    }

    list.innerHTML = items.map((item, i) => `
      <li class="queue-item">
        <span class="num">${i + 1}</span>
        <div class="info">
          <div class="title">${esc(item.title)}</div>
          <div class="url">${esc(item.url)}</div>
        </div>
        <button class="remove-btn" onclick="removeItem('${esc(item.id)}')" title="Remove">×</button>
      </li>`).join('');
  } catch { /* handled by status dot */ }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function addToQueue(e) {
  e.preventDefault();
  const url = document.getElementById('urlInput').value.trim();
  const title = document.getElementById('titleInput').value.trim();
  const startAt = parseFloat(document.getElementById('startAtInput').value) || 0;
  try {
    await api('/queue/add', {
      method: 'POST',
      body: JSON.stringify({ url, title, startAtSeconds: startAt })
    });
    document.getElementById('urlInput').value = '';
    document.getElementById('titleInput').value = '';
    document.getElementById('startAtInput').value = '';
    toast('Added to queue', 'success');
    refreshQueue();
  } catch (err) {
    toast(err.message);
  }
}

async function removeItem(id) {
  try {
    await api(`/queue/${encodeURIComponent(id)}`, { method: 'DELETE' });
    refreshQueue();
  } catch (err) {
    toast(err.message);
  }
}

async function cmd(action) {
  try {
    const result = await api(`/player/${action}`, { method: 'POST' });
    await refreshState();
    refreshQueue();
  } catch (err) {
    toast(err.message);
  }
}

// Queue mode
async function setMode(mode) {
  try {
    await api('/queue/mode', { method: 'POST', body: JSON.stringify({ mode }) });
    document.querySelectorAll('.mode-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === mode));
    toast(`Mode: ${mode}`, 'success');
  } catch (err) { toast(err.message); }
}

async function loadMode() {
  try {
    const res = await api('/queue/mode');
    document.querySelectorAll('.mode-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === res.mode));
  } catch {}
}

// Position reporting
async function reportPosition() {
  if (!ytReady || !ytPlayer || !ytPlayer.getCurrentTime) return;
  if (!lastApiState || lastApiState.state !== 'Playing') return;
  const pos = ytPlayer.getCurrentTime();
  try { await api('/player/position', { method: 'POST', body: JSON.stringify({ positionSeconds: pos }) }); } catch {}
}

// Error reporting
async function reportError(reason) {
  try { await api('/player/error', { method: 'POST', body: JSON.stringify({ reason }) }); } catch {}
  refreshState();
}

// SSE realtime connection
let eventSource = null;
function connectSSE() {
  if (eventSource) { eventSource.close(); }
  eventSource = new EventSource(`${API}/events`);
  document.getElementById('statusDot').className = 'status-dot connected';

  eventSource.addEventListener('playback-state', (e) => {
    try {
      const state = JSON.parse(e.data);
      lastApiState = state;
      renderState(state);
      syncPlayer(state);
    } catch {}
  });

  eventSource.addEventListener('playback-error', (e) => {
    try {
      const state = JSON.parse(e.data);
      lastApiState = state;
      renderState(state);
    } catch {}
  });

  eventSource.addEventListener('queue-updated', () => { refreshQueue(); });
  eventSource.addEventListener('queue-mode', (e) => {
    try {
      const res = JSON.parse(e.data);
      document.querySelectorAll('.mode-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === res.mode));
    } catch {}
  });

  eventSource.onerror = () => {
    document.getElementById('statusDot').className = 'status-dot error';
    eventSource.close();
    // Reconnect after 3s
    setTimeout(connectSSE, 3000);
  };
}

function renderState(state) {
  const badge = document.getElementById('stateBadge');
  const title = document.getElementById('npTitle');
  const card = document.getElementById('nowPlaying');
  const meta = document.getElementById('npMeta');

  const s = state.state.toLowerCase();
  badge.textContent = state.state;
  badge.className = `badge ${s}`;

  if (state.currentItem) {
    title.textContent = state.currentItem.title;
    title.className = 'np-title';
    card.classList.add('active');
  } else {
    title.textContent = 'Nothing queued';
    title.className = 'np-title empty';
    card.classList.remove('active');
  }

  let metaParts = [];
  if (state.positionSeconds > 0) {
    const m = Math.floor(state.positionSeconds / 60);
    const sec = Math.floor(state.positionSeconds % 60);
    metaParts.push(`⏱ ${m}:${sec.toString().padStart(2,'0')}`);
  }
  if (state.retryCount > 0) metaParts.push(`⚠ Retry ${state.retryCount}/3`);
  if (state.lastError) metaParts.push(`<span class="error-info">❌ ${esc(state.lastError)}</span>`);
  meta.innerHTML = metaParts.join(' &nbsp;·&nbsp; ');

  document.getElementById('statusDot').className = 'status-dot connected';
}

// Polling fallback (less frequent - SSE handles realtime)
function startPolling() {
  refreshState();
  refreshQueue();
  loadMode();
  refreshAnalytics();
  polling = setInterval(() => { refreshState(); refreshQueue(); }, 10000);
  setInterval(reportPosition, 5000);
  setInterval(refreshAnalytics, 15000);
}

async function refreshAnalytics() {
  try {
    const data = await api('/analytics');
    document.getElementById('statCommands').textContent = data.totalCommands;
    document.getElementById('statErrors').textContent = data.totalErrors;
    document.getElementById('statLatency').textContent = Math.round(data.averageCommandLatencyMs) + 'ms';
    const min = Math.floor(data.totalPlaybackSeconds / 60);
    const sec = Math.floor(data.totalPlaybackSeconds % 60);
    document.getElementById('statPlayback').textContent = `${min}:${sec.toString().padStart(2,'0')}`;
  } catch {}
}

// ── Admin / Security Controls ──

async function refreshKillSwitch() {
  try {
    const data = await api('/admin/kill-switch');
    const badge = document.getElementById('killSwitchBadge');
    if (data.active) {
      badge.textContent = '🚨 KILL SWITCH ACTIVE';
      badge.style.background = '#8b2500';
      badge.style.color = '#ff7d7d';
    } else {
      badge.textContent = 'OPERATIONAL';
      badge.style.background = '#2d5a2d';
      badge.style.color = '#7dff7d';
    }
  } catch {}
}

async function activateKillSwitch() {
  const reason = prompt('Kill switch reason:');
  if (!reason) return;
  await api('/admin/kill-switch', 'POST', { reason });
  showToast('🚨 Kill switch activated');
  refreshKillSwitch();
}

async function deactivateKillSwitch() {
  await fetch(API + '/admin/kill-switch', { method: 'DELETE' });
  showToast('✅ Kill switch deactivated');
  refreshKillSwitch();
}

function showAdminOutput(data) {
  const el = document.getElementById('adminOutput');
  el.style.display = 'block';
  el.textContent = JSON.stringify(data, null, 2);
}

async function viewAuditLog() {
  const data = await api('/admin/audit?count=20');
  showAdminOutput(data);
}

async function checkAnomalies() {
  const data = await api('/admin/anomalies');
  showAdminOutput(data);
  if (data.hasAnomalies) showToast('⚠️ Anomalies detected!');
  else showToast('✅ No anomalies');
}

connectSSE();
startPolling();
refreshKillSwitch();
setInterval(refreshKillSwitch, 15000);
</script>
